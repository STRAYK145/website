        <div class="quiz-card" id="quiz">
            <div class="col-md-12 mx-auto mb-3 mb-md-0" style="height: 300px; overflow: hidden;">

                <img src="./imajes/03.png" alt="О проекте" class="img-fluid rounded shadow-sm w-100 h-100"
                    style="object-fit: cover;">
            </div>
            <h3 class="fw-bold text-center mb-3">Куда вам стоит поехать в России?</h3>
            <p class="text-center text-muted">Ответьте на 15 вопросов, и мы подберём идеальное направление</p>

            <div class="progress mb-4">
                <div id="progress-bar" class="progress-bar bg-info" style="width: 0%"></div>
            </div>

            <h5 id="question" class="mb-4"></h5>
            <div id="options"></div>
        </div>

        <div id="result" class="result-card mt-4 d-none text-center">
            <h3 id="place-name" class="fw-bold"></h3>
            <p id="place-desc" class="mt-3"></p>
            <p class="mt-3 fst-italic" id="place-reason"></p>
        </div>

    </main>

    <footer class="text-center text-muted mt-4">
        <p>Сайт создал ст.гр.ИРспк-223 Маринин А.А.</p>
    </footer>

    <script>
        const questions = [
            { q: "Какой тип отдыха вам ближе?", a: ["Пляжный", "Познавательный", "Экстремальный", "Природный"] },
            { q: "Как вы относитесь к долгим переездам?", a: ["Нормально", "Предпочитаю недалеко", "Готов к приключениям", "Не люблю"] },
            { q: "Что для вас важнее?", a: ["Комфорт", "История", "Адреналин", "Тишина"] },
            { q: "Климат?", a: ["Тёплый", "Умеренный", "Холодный", "Свежий"] },
            { q: "Активности?", a: ["Море", "Экскурсии", "Походы", "Природа"] },
            { q: "Тип пейзажей?", a: ["Побережье", "Города", "Вулканы", "Леса"] },
            { q: "Уровень комфорта?", a: ["Высокий", "Средний", "Минимальный", "Не важен"] },
            { q: "Вы путешествуете...", a: ["С семьёй", "Пара", "Один", "С друзьями"] },
            { q: "Что вас вдохновляет?", a: ["Море", "Храмы", "Горы", "Озёра"] },
            { q: "Отдых — это?", a: ["Релакс", "Развитие", "Испытание", "Гармония"] },
            { q: "Любите ли вы экскурсии?", a: ["Да", "Иногда", "Редко", "Нет"] },
            { q: "Фотографии — важно?", a: ["Да", "Очень", "Не особо", "Иногда"] },
            { q: "Сезон поездки?", a: ["Лето", "Весна", "Осень", "Зима"] },
            { q: "Что запомнится больше?", a: ["Пляжи", "Архитектура", "Природа", "Тишина"] },
            { q: "Темп отдыха?", a: ["Спокойный", "Размеренный", "Активный", "Свободный"] }
        ];

        const directions = ["sochi", "gold", "kamchatka", "karelia"];
        const score = { sochi: 0, gold: 0, kamchatka: 0, karelia: 0 };

        const places = {
            sochi: [
                "Сочи", "Адлер", "Роза Хутор", "Лазаревское", "Красная Поляна"
            ],
            gold: [
                "Суздаль", "Владимир", "Ярославль", "Ростов Великий", "Переславль-Залесский"
            ],
            kamchatka: [
                "Долина гейзеров", "Вулкан Ключевской", "Авачинская бухта", "Паратунка", "Мутновский вулкан"
            ],
            karelia: [
                "Рускеала", "Кижи", "Ладожские шхеры", "Валаам", "Паанаярви"
            ]
        };

        let current = 0;

        function loadQuestion() {
            const q = questions[current];
            document.getElementById("question").innerText = q.q;
            const options = document.getElementById("options");
            options.innerHTML = "";

            q.a.forEach((text, index) => {
                const btn = document.createElement("button");
                btn.className = "btn btn-outline-dark option-btn";
                btn.innerText = text;
                btn.onclick = () => selectAnswer(index);
                options.appendChild(btn);
            });

            document.getElementById("progress-bar").style.width =
                ((current) / questions.length) * 100 + "%";
        }

        function selectAnswer(index) {
            score[directions[index]]++;
            current++;

            if (current < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById("quiz").classList.add("d-none");
            document.getElementById("result").classList.remove("d-none");

            const best = Object.keys(score).reduce((a, b) => score[a] > score[b] ? a : b);
            const place = places[best][Math.floor(Math.random() * 5)];

            document.getElementById("place-name").innerText = place;
            document.getElementById("place-desc").innerText =
                "Это направление идеально подходит под ваши предпочтения и стиль отдыха.";
            document.getElementById("place-reason").innerText =
                "Вы выбрали ответы, которые больше всего соответствуют особенностям этого региона.";
        }

        loadQuestion();
    </script>
