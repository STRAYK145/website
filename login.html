<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnowRussia — вход</title>
    <link rel="shortcut icon" href="./imajes/Vector.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            /* занимает всё доступное пространство между header и footer */
        }
    </style>
</head>

<body class="container">
    <header>
        <nav class="navbar navbar-expand-lg p-2 my-2 rounded-3 shadow-sm"
            style="background: linear-gradient(90deg, #bfcdd4, #e1e8eb);">

            <div class="container-fluid">
                <a href="index.html" id="logoNNN" class="me-2 d-flex align-items-center">
                    <img src="./imajes/Vector.svg" alt="Лого">
                </a>
                <a class="navbar-brand fw-bold fs-4" href="index.html">KnowRussia</a>
                <ul class="navbar-nav ms-3">
                    <li class="nav-item">
                        <a class="nav-link fw-semibold me-1" href="test.html">Тесты</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold me-1" href="all_about_tourism.html">Всё о туризме</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold me-1" href="about.html">О проекте</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item me-2">
                        <a class="btn btn-outline-dark btn-sm" href="reg.html">
                            Регистрация
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-dark btn-sm" href="login.html">
                            Вход
                        </a>
                    </li>
                </ul>

            </div>
            </div>
        </nav>
    </header>
    <main>
        <main class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
            <div class="card p-4 shadow-sm" style="max-width: 400px; width: 100%;">
                <h2 class="card-title text-center mb-3">Вход</h2>
                <form action="/auth/signin" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">Электронная почта</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Введите email"
                            required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="Введите пароль" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Войти</button>
                    <p class="text-center mt-3 mb-0">Нет аккаунта? <a href="reg.html" style="color: black;">Зарегистрироваться</a></p>
                </form>
            </div>
        </main>

    </main>
    <footer>
        <p class="text-center text-muted">Сайт создал ст.гр.ИРспк-223 Маринин А.А.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="animation.js"></script>
</body>

</html>
